# Redis Production Configuration
# Mounted via bind mount into the container

# Network
bind 0.0.0.0
port 6379
protected-mode no

# Persistence: Append Only File (AOF)
# Every write is logged — survives crashes
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no

# Persistence: RDB snapshots
# Save snapshot if: 900s and 1 change, 300s and 10 changes, 60s and 10000 changes
save 900 1
save 300 10
save 60 10000

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""

# Performance
tcp-keepalive 300
timeout 0
databases 16
