# =============================================================
# Nginx Main Configuration
# =============================================================

# Run as nginx user (not root — security)
user nginx;

# Auto-detect number of CPU cores
worker_processes auto;

# Error log location
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    # Max simultaneous connections per worker
    worker_connections 1024;
    use epoll;                  # Linux-optimized event model
    multi_accept on;            # Accept multiple connections at once
}

http {
    # Basic settings
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format — structured for production log parsing
    log_format main
        '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent" '
        'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;                # Kernel-level file transfer
    tcp_nopush on;              # Send headers in one packet
    tcp_nodelay on;             # Don't buffer small packets
    keepalive_timeout 65;       # Keep connections alive 65s
    types_hash_max_size 2048;

    # Security headers applied to all responses
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Hide Nginx version from error pages and headers
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Include all server block configs
    include /etc/nginx/conf.d/*.conf;
}
