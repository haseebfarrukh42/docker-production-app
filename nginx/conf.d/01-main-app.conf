# =============================================================
# Server Block: Main HTTPS Application
# This is where ALL routing decisions are made
# =============================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;                   # Enable HTTP/2 for performance
    server_name localhost _;    # Match localhost and any hostname

    # ── SSL Configuration ──────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/app.crt;
    ssl_certificate_key /etc/nginx/ssl/app.key;

    # Modern SSL settings — TLS 1.2 and 1.3 only (1.0 and 1.1 are insecure)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Strong cipher suites — reject weak encryption
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # SSL session caching — improves performance for repeat visitors
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS: Tell browsers to always use HTTPS for 1 year
    # (only enable this in production with real certificates)
    # add_header Strict-Transport-Security "max-age=31536000" always;

    # ── Security Headers ───────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Client Upload Limit ────────────────────────────────
    client_max_body_size 50M;

    # ── LOCATION 1: Frontend (React App) ───────────────────
    # Matches everything that doesn't match more specific rules
    location / {
        proxy_pass http://frontend:80;

        # Pass important headers to the upstream
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Buffer settings
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # ── LOCATION 2: Node.js Backend API ────────────────────
    # All requests to /api/ go to the Node.js backend
    location /api/ {
        proxy_pass http://backend:5000/api/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # For APIs: disable buffering for real-time responses
        proxy_buffering off;

        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── LOCATION 3: Python FastAPI Service ─────────────────
    # Requests to /api/python/ go to the Python service
    location /api/python/ {
        # Rewrite: strip /api/python prefix before forwarding
        # /api/python/info → /info on the Python service
        rewrite ^/api/python/(.*) /$1 break;
        proxy_pass http://api-service:8000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── LOCATION 4: Health Check Endpoints ─────────────────
    location /health {
        proxy_pass http://backend:5000/health;
        proxy_set_header Host $host;
        access_log off;         # Don't log health checks (reduces noise)
    }

    # ── LOCATION 5: Nginx Status Page ──────────────────────
    location /nginx-status {
        stub_status on;
        access_log off;
        # Restrict to localhost only
        allow 127.0.0.1;
        allow 172.20.0.0/16;    # Allow from Docker networks
        deny all;
    }

    # ── Custom Error Pages ─────────────────────────────────
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
