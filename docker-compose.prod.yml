# =============================================================
# docker-compose.prod.yml
# Production overrides — used in deployment
# Usage: docker compose -f docker-compose.yml \
#                       -f docker-compose.prod.yml up -d
#
# This file:
#   ✅ Removes bind mounts (code is in the image)
#   ✅ Uses production Dockerfiles
#   ✅ Removes direct port exposure
#   ✅ Sets production environment variables
#   ✅ Tightens resource limits
# =============================================================

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile         # ← Production Dockerfile (multi-stage)
      target: production
    command: node server.js          # ← No nodemon in production
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=warn               # Less verbose in production
    # No volumes (code is inside the image)
    # No direct port exposure (only through nginx)

  api-service:
    build:
      context: ./api-service
      dockerfile: Dockerfile
      target: production
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    # --workers 2: two worker processes for production throughput
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=warning

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile         # ← Multi-stage: React build → Nginx
      target: production
    # No command override — uses Nginx from production image

  postgres:
    # No direct port exposure in production
    environment:
      - POSTGRES_LOG_STATEMENT=none  # Don't log all queries in production

  nginx:
    # Enforce HTTPS-only in production
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
